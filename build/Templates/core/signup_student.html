{% extends "core/base.html" %}

{% block title %}Sign up as Student · LevelUp!{% endblock %}

{% block extra_head %}
<!-- Auth styles are in levelup.css -->
{% endblock %}

{% block content %}
<div class="auth-shell lu-fadein">
    <div class="auth-header">
        <div class="auth-logo">LevelUp<span></span></div>
        <div class="auth-sub">Create your student account</div>
    </div>
    <div class="auth-card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="lu-btn lu-btn-primary" style="width:100%; margin-top:8px; padding:11px; font-size:.95rem; border-radius:12px; justify-content:center;">
                Create account
            </button>
        </form>
    </div>
    <p style="text-align:center; margin-top:18px; font-size:.84rem; color:var(--muted);">
        Already have an account? <a href="{% url 'login' %}" style="color:var(--accent); font-weight:500; text-decoration:none;">Log in</a>
    </p>
    <p style="text-align:center; margin-top:8px; font-size:.82rem; color:var(--muted);">
        <a href="{% url 'signup_choice' %}" style="color:var(--muted); text-decoration:none;">← Change account type</a>
    </p>
</div>
{% endblock %}
