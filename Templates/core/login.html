{% extends "core/base.html" %}

{% block title %}Log in · LevelUp!{% endblock %}

{% block extra_head %}
<style>
    .auth-shell {
        max-width: 420px;
        margin: 40px auto 0;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 32px;
    }
    .auth-logo {
        font-family: var(--font-display);
        font-size: 1.5rem;
        letter-spacing: -0.5px;
        color: var(--ink);
        margin-bottom: 8px;
    }
    .auth-logo span {
        display: inline-block;
        width: 8px; height: 8px;
        background: var(--accent2);
        border-radius: 50%;
        margin-left: 2px;
        vertical-align: middle;
    }
    .auth-sub { color: var(--muted); font-size: .9rem; }

    .auth-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 32px;
        box-shadow: var(--shadow-lg);
    }
    .auth-card p { margin-bottom: 16px; }
    .auth-card label { display: block; font-size: .8rem; font-weight: 500; color: #4b4540; margin-bottom: 5px; }
    .auth-footer-link {
        text-align: center;
        margin-top: 20px;
        font-size: .84rem;
        color: var(--muted);
    }
    .auth-footer-link a { color: var(--accent); font-weight: 500; text-decoration: none; }
    .auth-footer-link a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-shell lu-fadein">
    <div class="auth-header">
        <div class="auth-logo">LevelUp<span></span></div>
        <div class="auth-sub">Welcome back</div>
    </div>

    <div class="auth-card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="lu-btn lu-btn-primary" style="width:100%; margin-top:8px; padding:11px; font-size:.95rem; border-radius:12px;">
                Log in
            </button>
        </form>
    </div>

    <div class="auth-footer-link">
        Don't have an account? <a href="{% url 'signup_choice' %}">Sign up free</a>
    </div>
</div>
{% endblock %}
